name: Daily civ stats fetch

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC every day
    - cron: "0 14 * * *"  # 14:00 UTC every day (second run for more coverage)
  workflow_dispatch:        # Allow manual trigger from GitHub UI
    inputs:
      branch:
        description: "Branch to run on (main or develop)"
        default: "main"
  push:
    branches: [develop]
    paths: ["src/data/strategy-stats.json"]

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run daily stats fetch
        run: npm run stats:fetch
        timeout-minutes: 15

      - name: Run map stats backfill (weekly — Sundays)
        if: github.event_name == 'workflow_dispatch' || startsWith(github.event.schedule, '0 2') && contains(toJSON(github.event), 'Sun')
        run: npm run maps:backfill
        timeout-minutes: 25
        continue-on-error: true

      - name: Commit updated stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/daily-stats/ src/data/map-stats.json
          git diff --cached --quiet && echo "No new data, skipping commit" || \
            git commit -m "chore: daily stats $(date -u +%Y-%m-%d) [skip ci]"

      - name: Push changes
        run: git push
